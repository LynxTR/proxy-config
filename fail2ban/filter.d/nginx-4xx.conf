# fail2ban/filter.d/nginx-4xx.conf
#
# Catches IPs accumulating repeated 4xx errors — a strong signal of
# vulnerability scanning or credential stuffing.
#
# We only match 401 (unauthorized) and 403 (forbidden).
# 404 is excluded — it's too noisy on a real site.
# 429 is handled separately by nginx-ratelimit.
#
# Matches the custom log format defined in nginx.conf:
#   $remote_addr - $remote_user [$time_local] "$request" $status ...

[Definition]
failregex = ^<HOST> - \S+ \[.*\] ".*" (401|403) .*$

ignoreregex =
