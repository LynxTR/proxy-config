# fail2ban/filter.d/nginx-ratelimit.conf
#
# Catches IPs that hit our nginx rate limit (returns 429).
# Matches the custom log format defined in nginx.conf:
#   $remote_addr - $remote_user [$time_local] "$request" $status ...

[Definition]
failregex = ^<HOST> - \S+ \[.*\] ".*" 429 .*$

ignoreregex =
