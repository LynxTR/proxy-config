# fail2ban/jail.d/nginx.conf
#
# Fail2ban jails for the nginx reverse proxy.
# Deployed to: /etc/fail2ban/jail.d/nginx.conf
#
# SSH protection is in jail.d/ssh.conf

[DEFAULT]
# Default ban: 1 hour, check the last 10 minutes
bantime  = 1h
findtime = 10m
maxretry = 10

# iptables-multiport blocks only ports 80+443 (surgical; SSH stays open).
# If your server uses nftables instead of iptables, change to:
#   banaction = nftables-multiport
banaction = iptables-multiport

# ---------------------------------------------------------------------------
# nginx — vulnerability scanners / bot search
#
# Uses the built-in filter that matches probes for common paths
# like /wp-admin, /.env, /phpmyadmin, etc.
# ---------------------------------------------------------------------------
[nginx-botsearch]
enabled  = true
port     = http,https
filter   = nginx-botsearch
logpath  = /var/log/nginx/access.log
           /var/log/nginx/*.access.log
maxretry = 5
findtime = 10m
bantime  = 24h

# ---------------------------------------------------------------------------
# nginx — repeated 401/403 (credential stuffing / probing)
# ---------------------------------------------------------------------------
[nginx-4xx]
enabled  = true
port     = http,https
filter   = nginx-4xx
logpath  = /var/log/nginx/access.log
           /var/log/nginx/*.access.log
maxretry = 30
findtime = 5m
bantime  = 1h
