# fail2ban/jail.d/ssh.conf
#
# Multi-layer SSH protection.
# Deployed to: /etc/fail2ban/jail.d/ssh.conf
#
# Layers:
#   sshd              — brute force (wrong password/key), 5 tries → 7-day ban
#   sshd-aggressive   — any single auth failure = immediate 24h ban.
#                       Enable this only if you use key-only auth (no passwords).
#   sshd-portscan     — bans IPs that hit the SSH port without completing a
#                       handshake (scanners, probers).

# ---------------------------------------------------------------------------
# Standard brute-force protection
# ---------------------------------------------------------------------------
[sshd]
enabled   = true
port      = ssh
filter    = sshd
backend   = systemd
# 5 failed attempts in 10 minutes → banned for 7 days.
# Repeat offenders get progressively longer bans (see bantime.multiplier below).
maxretry  = 5
findtime  = 10m
bantime   = 7d

# Each repeat offence multiplies the ban time:
#   1st ban:  7d × 1  = 7 days
#   2nd ban:  7d × 2  = 14 days
#   3rd ban:  7d × 4  = 28 days
#   4th+ ban: 7d × 8+ = 56+ days  (capped at 1 year by bantime.maxtime)
bantime.increment   = true
bantime.multiplier  = 2
bantime.maxtime     = 365d

# ---------------------------------------------------------------------------
# Aggressive mode — 1 failure = banned for 24h
#
# Only enable this if you have disabled password authentication in sshd_config
# (PasswordAuthentication no / AuthenticationMethods publickey).
# With key-only auth, a single failure is always an attacker — never a typo.
# ---------------------------------------------------------------------------
[sshd-aggressive]
enabled   = true          # key-only auth confirmed — 1 failure = always an attacker
port      = ssh
filter    = sshd
backend   = systemd
maxretry  = 1
findtime  = 1m
bantime   = 24h
bantime.increment  = true
bantime.multiplier = 2
bantime.maxtime    = 365d

# ---------------------------------------------------------------------------
# Port scanner / prober — bans IPs that probe the SSH port without a
# valid handshake. Uses the built-in filter "sshd" which also matches
# "Connection closed by ... [preauth]" lines.
# ---------------------------------------------------------------------------
[sshd-portscan]
enabled   = true
port      = ssh
filter    = sshd[mode=aggressive]
backend   = systemd
maxretry  = 3
findtime  = 1m
bantime   = 30d
