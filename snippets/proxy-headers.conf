# snippets/proxy-headers.conf
# Standard headers to forward to upstream backends.
# Included by every proxy location block.

proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host  $server_name;
# Pass the original Cloudflare header through so the backend can read the real
# visitor IP directly without parsing X-Forwarded-For.
proxy_set_header CF-Connecting-IP  $http_cf_connecting_ip;
