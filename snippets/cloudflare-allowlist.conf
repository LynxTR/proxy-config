# snippets/cloudflare-allowlist.conf
#
# Blocks any request that does NOT come from a Cloudflare edge IP.
# Include this in every server block to prevent attackers from bypassing
# Cloudflare and hitting your origin directly.
#
# The geo block that populates $is_cloudflare lives in nginx.conf (http
# context) and evaluates $realip_remote_addr — the original connection IP
# before ngx_http_realip_module replaces $remote_addr with the visitor IP.
# Using allow/deny here would be wrong because by the time the access phase
# runs, $remote_addr is already the visitor's real IP, not a Cloudflare IP.
#
# Cloudflare publishes their full IP list at:
#   https://www.cloudflare.com/ips/

if ($is_allowed = 0) {
    return 444;
}
