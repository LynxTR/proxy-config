user www-data;
worker_processes auto;
pid /run/nginx.pid;

# Pin each worker to its own CPU core — eliminates cross-core migration overhead.
worker_cpu_affinity auto;

# Give nginx workers higher OS scheduling priority (nice -5).
# Range: -20 (highest) to 20 (lowest). -5 is a safe boost without
# starving system processes.
worker_priority -5;

# worker_processes auto — spawns one worker per CPU core.
# worker_rlimit_nofile must be >= worker_connections * 2
#   e.g. 8 workers × 16384 × 2 = 262144 fds; 65536 per worker covers that.
# fs.file-max in sysctl/99-nginx-tuning.conf is set to 2000000.
worker_rlimit_nofile 65536;

include /etc/nginx/modules-enabled/*.conf;

events {
    # worker_connections × worker_processes = total simultaneous connections.
    # At 3000 req/s with ~30 ms avg response time, peak open connections
    # ≈ 3000 × 0.03 = ~90 at any instant. 16384 is a generous safety margin.
    worker_connections 16384;
    use epoll;
    multi_accept on;
}

http {
    ##
    # Basic Settings
    ##
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;

    # Cloudflare keeps connections open — high keepalive to avoid reconnecting
    # for every request from the same edge node.
    keepalive_timeout  120;
    keepalive_requests 10000;

    types_hash_max_size 2048;
    server_tokens      off;  # hide nginx version

    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    ##
    # Logging
    ##
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" cache=$upstream_cache_status';

    # buffer=64k flush=5s — workers write to a 64 KB memory buffer and flush
    # every 5 seconds rather than calling write() on every single request.
    # At 3000 req/s this eliminates ~3000 syscalls/s per worker from logging.
    access_log /var/log/nginx/access.log main buffer=64k flush=5s;
    error_log  /var/log/nginx/error.log warn;

    ##
    # Gzip — DISABLED
    #
    # Cloudflare compresses responses to end users automatically.
    # Enabling gzip here would burn CPU cycles compressing data that
    # Cloudflare would then decompress and re-compress anyway.
    # Keeping it off saves meaningful CPU on VPS-grade vCores.
    ##
    gzip off;

    ##
    # WebSocket upgrade map — used in app conf templates
    #   $http_upgrade is set  → Connection: upgrade  (WebSocket handshake)
    #   $http_upgrade is ""   → Connection: ""        (HTTP/1.1 keepalive)
    ##
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      '';
    }

    ##
    # Open file cache
    #
    # Cache file descriptors and stat() results for config files, logs, and
    # static assets.  On weak vCPUs, avoiding repeated syscalls per request
    # makes a measurable difference.
    #
    #   max=20000    — keep up to 20k entries in cache
    #   inactive=60s — drop entries not accessed in 60 seconds
    ##
    open_file_cache          max=20000 inactive=60s;
    open_file_cache_valid    30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors   on;

    ##
    # Image proxy cache zone
    #
    #   Server: 100 GB NVMe SSD
    #   OS + logs + system:  ~10 GB reserved
    #   Available for cache:  ~80 GB
    #
    #   keys_zone=imgproxy_cache:256m
    #       256 MB shared memory → ~2 000 000 cache keys tracked in RAM.
    #
    #   max_size=80g
    #       Hard disk cap — LRU eviction kicks in when disk hits 80 GB.
    #       This is the ONLY deletion trigger; inactive=3650d is just a
    #       safety net for truly abandoned entries.
    #
    #   use_temp_path=off
    #       Write directly to the cache dir — NVMe makes this fast, and
    #       it avoids the extra copy that temp_path would add.
    ##
    proxy_cache_path /var/cache/nginx/imgproxy
        levels=1:2
        keys_zone=imgproxy_cache:256m
        max_size=80g
        inactive=3650d
        use_temp_path=off
        loader_threshold=300
        loader_files=200;

    ##
    # Rate limiting zones
    #
    #   general  — 200 req/s per IP for apps
    #     A single page load triggers many parallel requests:
    #     JS chunks, CSS, API calls, fonts, etc.
    #     burst=300 absorbs the initial spike; 200r/s handles sustained load.
    #
    #   imgproxy — 100 req/s per IP for image transforms
    #     Pages can display up to 40 images simultaneously. Browsers open
    #     6-8 parallel connections so all 40 fire near-instantly.
    #     burst=150 comfortably absorbs that; 100r/s handles sustained browsing.
    #
    #   We return 429 (not the default 503) so fail2ban can distinguish
    #   rate-limit hits from real backend errors.
    ##
    limit_req_zone $binary_remote_addr zone=general:20m  rate=20r/s;
    limit_req_zone $binary_remote_addr zone=imgproxy:20m rate=20r/s;
    limit_req_status 429;

    # Restore real visitor IPs forwarded by Cloudflare
    include /etc/nginx/snippets/cloudflare-realip.conf;

    # Set $is_cloudflare = 1 when the *connection* IP is a Cloudflare edge
    # node.  Must use $realip_remote_addr (the pre-replacement address) rather
    # than $remote_addr, which has already been rewritten to the visitor IP by
    # the realip module above.  Referenced by cloudflare-allowlist.conf.
    geo $realip_remote_addr $is_cloudflare {
        default 0;

        # --- IPv4 ---
        103.21.244.0/22  1;
        103.22.200.0/22  1;
        103.31.4.0/22    1;
        104.16.0.0/13    1;
        104.24.0.0/14    1;
        108.162.192.0/18 1;
        131.0.72.0/22    1;
        141.101.64.0/18  1;
        162.158.0.0/15   1;
        172.64.0.0/13    1;
        173.245.48.0/20  1;
        188.114.96.0/20  1;
        190.93.240.0/20  1;
        197.234.240.0/22 1;
        198.41.128.0/17  1;

        # --- IPv6 ---
        2400:cb00::/32 1;
        2405:8100::/32 1;
        2405:b500::/32 1;
        2606:4700::/32 1;
        2803:f800::/32 1;
        2a06:98c0::/29 1;
        2c0f:f248::/32 1;
    }

    include /etc/nginx/conf.d/*.conf;
}
