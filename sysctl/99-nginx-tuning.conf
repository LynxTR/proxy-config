# sysctl/99-nginx-tuning.conf
#
# Good baseline for a VPS with NVMe storage and 1 Gb/s NIC.
# Target: ~3000 req/s sustained
#
# Deploy:
#   sudo cp sysctl/99-nginx-tuning.conf /etc/sysctl.d/99-nginx-tuning.conf
#   sudo sysctl --system
#
# Or let bootstrap.sh do it automatically.

# ---------------------------------------------------------------------------
# TCP connection queuing
# ---------------------------------------------------------------------------

# How many half-open connections the kernel queues before nginx accepts them.
# 6 workers × 16384 worker_connections = 98304 max; match that here.
net.core.somaxconn = 65535
net.ipv4.tcp_max_syn_backlog = 65535

# Packet backlog per NIC — sized for 1 Gb/s bursts.
net.core.netdev_max_backlog = 65535

# ---------------------------------------------------------------------------
# TCP socket recycling
# ---------------------------------------------------------------------------

# At 3000 req/s every socket spends ~60 s in TIME_WAIT by default.
# 3000 × 60 = 180 000 sockets — raise the bucket limit well above that.
net.ipv4.tcp_max_tw_buckets = 1440000

# Reuse TIME_WAIT sockets for new outbound connections.
net.ipv4.tcp_tw_reuse = 1

# Close idle sockets faster — frees ports under sustained load.
net.ipv4.tcp_fin_timeout = 10

# More ephemeral ports for outbound connections to the backend.
net.ipv4.ip_local_port_range = 1024 65535

# Don't halve the TCP congestion window after idle.
# Cloudflare keepalives mean connections stay warm; disabling slow-start
# restart keeps throughput consistent when a burst arrives after a lull.
net.ipv4.tcp_slow_start_after_idle = 0

# ---------------------------------------------------------------------------
# TCP buffer sizes
#
# BDP example: 125 MB/s (1 Gb/s) × 0.020 s RTT = 2.5 MB
# 16 MB buffers are 6× BDP — enough headroom for burst absorption.
# Adjust if your NIC speed or RTT to backend differs significantly.
# With sufficient RAM: 16 MB × 2 directions × ~500 sockets
# = ~16 GB worst case, but in practice far less.
# ---------------------------------------------------------------------------
net.core.rmem_default = 262144
net.core.rmem_max     = 16777216
net.core.wmem_default = 262144
net.core.wmem_max     = 16777216
net.ipv4.tcp_rmem = 4096 262144 16777216
net.ipv4.tcp_wmem = 4096 262144 16777216

# ---------------------------------------------------------------------------
# File descriptors
#
# 6 workers × 65536 worker_rlimit_nofile = 393216 fds for nginx alone.
# Set fs.file-max well above that.
# ---------------------------------------------------------------------------
fs.file-max = 2000000
